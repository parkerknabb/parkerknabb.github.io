- year: ""
  org: Before all of this
  title: Origins
  desc: Took apart a PC with my dad in 1st grade. Ran the computer lab before school through 5th grade. Went back to my elementary school on Tuesdays and Thursdays in 6th grade just to keep helping — called it "Tech on the T's." Choir from elementary school through Purdue Varsity Glee Club. FLL, FTC, and FRC robotics through senior year. A morning broadcast in middle school, edited in iMovie, played back every day. None of it was a plan.
