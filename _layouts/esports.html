<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: "Purdue Esports Broadcast Operations Guide" }}</title>
<style>
  :root {
    --gold: #CFB991;
    --black: #000000;
    --dark: #1a1a1a;
    --mid: #2a2a2a;
    --light: #f5f5f5;
    --warn: #e07b39;
    --ok: #4caf7d;
    --border: #333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--dark);
    color: var(--light);
    line-height: 1.6;
  }

  header {
    background: var(--black);
    border-bottom: 3px solid var(--gold);
    padding: 28px 40px 20px;
  }
  header h1 {
    font-size: 1.7rem;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  header p { color: #aaa; font-size: 0.85rem; margin-top: 4px; }

  nav {
    background: var(--mid);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    gap: 0;
    flex-wrap: wrap;
  }
  nav a {
    color: #bbb;
    text-decoration: none;
    padding: 12px 18px;
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  nav a:hover, nav a.active { color: var(--gold); border-bottom-color: var(--gold); }

  main { max-width: 960px; margin: 0 auto; padding: 36px 40px 80px; }

  section { display: none; }
  section.active { display: block; }

  h2 {
    font-size: 1.25rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  h3 {
    font-size: 1rem;
    color: #ddd;
    margin: 24px 0 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
  }
  p { margin-bottom: 12px; color: #ccc; font-size: 0.95rem; }

  .signal-flow {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 20px 0;
    align-items: center;
  }
  .sf-box {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.8rem;
    text-align: center;
    min-width: 110px;
  }
  .sf-box .label { color: #888; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 2px; }
  .sf-box .name { color: var(--light); font-weight: 600; }
  .sf-arrow { color: var(--gold); font-size: 1.2rem; flex-shrink: 0; }

  .eq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }
  .eq-card {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .eq-card h4 {
    color: var(--gold);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }
  .eq-card ul { list-style: none; }
  .eq-card ul li {
    font-size: 0.88rem;
    color: #bbb;
    padding: 3px 0;
    border-bottom: 1px solid #333;
  }
  .eq-card ul li:last-child { border-bottom: none; }
  .eq-card ul li::before { content: '▸ '; color: var(--gold); }

  .checklist { list-style: none; margin: 12px 0; }
  .checklist li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 12px;
    border-bottom: 1px solid #2e2e2e;
    font-size: 0.9rem;
    color: #ccc;
  }
  .checklist li:last-child { border-bottom: none; }
  .checklist li input[type="checkbox"] {
    margin-top: 2px;
    accent-color: var(--gold);
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .checklist li label { cursor: pointer; }
  .checklist li.checked label { text-decoration: line-through; color: #555; }
  .check-group {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .check-group-header {
    background: #222;
    padding: 10px 16px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gold);
    font-weight: 700;
  }
  .warn-note {
    background: #2d1f0e;
    border-left: 3px solid var(--warn);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: #e8c49a;
    margin: 12px 0;
  }
  .warn-note strong { color: var(--warn); }
  .ok-note {
    background: #0f2e1e;
    border-left: 3px solid var(--ok);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: #a8e0c0;
    margin: 12px 0;
  }
  .ok-note strong { color: var(--ok); }

  .issue-card {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .issue-header {
    background: #1e1e1e;
    padding: 13px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }
  .issue-header:hover { background: #252525; }
  .issue-title { font-size: 0.95rem; font-weight: 600; color: #eee; }
  .issue-tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tag-cam     { background: #1a2d4a; color: #6aacf5; }
  .tag-net     { background: #2d1f0e; color: #e8a96a; }
  .tag-display { background: #1a2d1a; color: #6adc8a; }
  .tag-audio   { background: #2d1a2d; color: #c88adc; }
  .tag-hw      { background: #2d1010; color: #f5a0a0; }
  .issue-body { display: none; padding: 16px 18px; border-top: 1px solid var(--border); }
  .issue-body.open { display: block; }
  .chevron { color: #666; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  .steps { list-style: none; counter-reset: step; }
  .steps li {
    counter-increment: step;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 8px 0;
    font-size: 0.88rem;
    color: #ccc;
    border-bottom: 1px solid #2a2a2a;
  }
  .steps li:last-child { border-bottom: none; }
  .steps li::before {
    content: counter(step);
    background: var(--gold);
    color: var(--black);
    font-weight: 800;
    font-size: 0.7rem;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  code {
    background: #111;
    border: 1px solid #333;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'Consolas', monospace;
    font-size: 0.85em;
    color: #e0c97f;
  }
  kbd {
    background: #111;
    border: 1px solid #444;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: monospace;
  }

  .power-strip {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin: 16px 0;
    background: #111;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid #333;
  }
  .plug {
    background: var(--mid);
    border: 2px solid #444;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.72rem;
    text-align: center;
    color: #bbb;
    min-width: 90px;
  }
  .plug .plug-icon { font-size: 1.1rem; display: block; margin-bottom: 3px; }
  .plug.filled { border-color: var(--ok); }
  .plug.filled .plug-icon { color: var(--ok); }

  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin: 14px 0; }
  th {
    background: #111;
    color: var(--gold);
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    padding: 10px 14px;
    text-align: left;
  }
  td { padding: 9px 14px; border-bottom: 1px solid #2a2a2a; color: #ccc; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #222; }

  .reset-btn {
    background: transparent;
    border: 1px solid #444;
    color: #888;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 0.8rem;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .reset-btn:hover { border-color: var(--gold); color: var(--gold); }

  .game-tab {
    background: var(--mid);
    border: 1px solid var(--border);
    color: #bbb;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .game-tab:hover { border-color: var(--gold); color: var(--gold); }
  .game-tab.active { background: #1a2200; border-color: var(--gold); color: var(--gold); font-weight: 600; }

  .filter-btn {
    background: var(--mid);
    border: 1px solid var(--border);
    color: #bbb;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--black); font-weight: 700; }

  .specs-nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: sticky;
    top: 20px;
  }
  .specs-nav a {
    color: #888;
    text-decoration: none;
    font-size: 0.8rem;
    padding: 5px 10px;
    border-left: 2px solid #333;
    transition: all 0.15s;
  }
  .specs-nav a:hover { color: var(--gold); border-left-color: var(--gold); }
  .specs-layout { display: grid; grid-template-columns: 160px 1fr; gap: 40px; align-items: start; }
  .specs-section { margin-bottom: 48px; scroll-margin-top: 20px; }
  .specs-section h3 {
    font-size: 1rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .specs-section h4 {
    font-size: 0.8rem;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 20px 0 8px;
  }
  .specs-section p { font-size: 0.9rem; color: #bbb; line-height: 1.7; }
  .spec-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 8px 0 20px; }
  .spec-table th { background: #111; color: var(--gold); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; text-align: left; }
  .spec-table td { padding: 8px 12px; border-bottom: 1px solid #262626; color: #ccc; vertical-align: top; }
  .spec-table td:first-child { color: #888; white-space: nowrap; width: 35%; }
  .spec-table tr:last-child td { border-bottom: none; }
  .spec-table tr:hover td { background: #222; }
  .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .device-card { background: #1e1e1e; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .device-card-header { background: #111; padding: 10px 14px; }
  .device-card-header .device-name { font-size: 0.88rem; font-weight: 600; color: #eee; }
  .device-card-header .device-role { font-size: 0.72rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }
  .device-card table { margin: 0; }
  .device-card td { font-size: 0.8rem; padding: 6px 12px; }
  .placeholder-field {
    display: inline-block;
    background: #2a1f00;
    border: 1px dashed #c8902a;
    border-radius: 3px;
    padding: 1px 8px;
    font-size: 0.8rem;
    color: #f0b84a;
    font-family: 'Consolas', monospace;
  }
  .signal-hop { display: flex; align-items: stretch; gap: 0; margin: 16px 0; flex-wrap: wrap; }
  .signal-hop-box {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.78rem;
    min-width: 120px;
    flex: 1;
  }
  .signal-hop-box .sh-device { color: #eee; font-weight: 600; margin-bottom: 4px; }
  .signal-hop-box .sh-detail { color: #777; line-height: 1.4; }
  .signal-hop-box .sh-detail span { display: block; }
  .signal-hop-arrow { display: flex; align-items: center; padding: 0 6px; color: var(--gold); font-size: 1rem; flex-shrink: 0; }
  .rationale-card {
    background: var(--mid);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .rationale-card h4 { color: #eee; font-size: 0.88rem; margin-bottom: 8px; }
  .rationale-card p { font-size: 0.85rem; color: #999; margin: 0; line-height: 1.6; }

  @media (max-width: 700px) {
    .specs-layout { grid-template-columns: 1fr; }
    .specs-nav { display: none; }
    .device-grid { grid-template-columns: 1fr; }
    main { padding: 20px 16px 60px; }
    header { padding: 20px 16px 16px; }
    nav { padding: 0 8px; }
    nav a { padding: 10px 10px; font-size: 0.8rem; }
    .eq-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Purdue Esports — Broadcast Documentation</h1>
  <p>OPERATIONS AND TECH SPECS</p>
</header>

<nav>
  <a href="#" class="active" onclick="showSection('overview', this)">Overview</a>
  <a href="#" onclick="showSection('connections', this)">Connections</a>
  <a href="#" onclick="showSection('setup', this)">Operations</a>
  <a href="#" onclick="showSection('games', this)">Game Setup</a>
  <a href="#" onclick="showSection('events', this)">Event Setup</a>
  <a href="#" onclick="showSection('teardown', this)">Teardown</a>
  <a href="#" onclick="showSection('troubleshooting', this)">Troubleshooting</a>
  <a href="#" onclick="showSection('techspecs', this)" style="display:none">Tech Specs</a>
</nav>

<main>
{{ content }}
</main>

<script>
  function showSection(id, link) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav > a').forEach(a => a.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (link) link.classList.add('active');
    return false;
  }

  function showGame(id, btn) {
    document.querySelectorAll('.game-panel').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
    const defaultCard = document.getElementById('game-default');
    if (defaultCard) defaultCard.style.display = 'none';
    const panel = document.getElementById('game-' + id);
    if (panel) panel.style.display = 'block';
    if (btn) btn.classList.add('active');
  }

  function showEvent(id, btn) {
    document.querySelectorAll('[id^="event-"]:not(#event-default)').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.game-tab[data-event]').forEach(b => b.classList.remove('active'));
    const defaultCard = document.getElementById('event-default');
    if (defaultCard) defaultCard.style.display = 'none';
    const panel = document.getElementById('event-' + id);
    if (panel) panel.style.display = 'block';
    if (btn) { btn.classList.add('active'); btn.setAttribute('data-event', id); }
  }

  function goToTeardown() {
    const link = document.querySelector('nav a[onclick*="teardown"]');
    showSection('teardown', link);
  }

  function filterIssues(tag, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.issue-card').forEach(card => {
      card.style.display = (tag === 'all' || card.dataset.tag === tag) ? '' : 'none';
    });
  }

  function toggleIssue(header) {
    const body = header.nextElementSibling;
    const chevron = header.querySelector('.chevron');
    body.classList.toggle('open');
    chevron.classList.toggle('open');
  }

  function resetChecklist() {
    document.querySelectorAll('.checklist input[type="checkbox"]').forEach(cb => {
      cb.checked = false;
      cb.closest('li').classList.remove('checked');
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.checklist input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => {
        cb.closest('li').classList.toggle('checked', cb.checked);
      });
    });
  });
</script>

</body>
</html>
